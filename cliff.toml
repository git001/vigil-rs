[changelog]
header = """# Changelog

All notable changes to vigil-rs are documented here.
Format follows [Keep a Changelog](https://keepachangelog.com/).

"""

body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] — {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim | upper_first }}
{% for commit in commits %}\
- {% if commit.scope %}**{{ commit.scope }}**: {% endif %}\
{{ commit.message | upper_first }}\
{% if commit.breaking %} [**BREAKING CHANGE**]{% endif %}\
 ([`{{ commit.id | truncate(length=7, end="") }}`]({{ commit.id }}))
{% endfor %}\
{% endfor %}\n
"""

trim = true
footer = ""

[git]
conventional_commits = true
filter_unconventional = false
split_commits = false

commit_preprocessors = [
    { pattern = '\(#([0-9]+)\)', replace = "([#${1}](https://github.com/git001/vigil-rs/issues/${1}))" },
]

commit_parsers = [
    { message = "^feat",          group = "Features" },
    { message = "^fix",           group = "Bug Fixes" },
    { message = "^perf",          group = "Performance" },
    { message = "^refactor",      group = "Refactoring" },
    { message = "^doc|^docs",     group = "Documentation" },
    { message = "^test",          group = "Testing" },
    { message = "^ci",            group = "CI/CD" },
    { message = "^chore\\(deps",  group = "Dependencies" },
    { message = "^chore",         group = "Miscellaneous", skip = true },
    { body = ".*security",        group = "Security" },
]

protect_breaking_commits = false
filter_commits = false
tag_pattern = "v[0-9].*"
skip_tags = "v.*-rc[0-9]+"
ignore_tags = ""
topo_order = false
sort_commits = "oldest"
