; PHP-FPM main configuration for vigil-rs example.
;
; Replaces /etc/php83/php-fpm.conf so we can redirect the master-process
; error log to stderr — the only way to do this is in [global], which cannot
; be set from a file in php-fpm.d/.
;
; Log routing overview:
;   FPM master errors  → stderr  (this file: error_log)
;   Per-request access → stdout  (pool.conf: access.log)
;   Worker PHP errors  → stderr  (pool.conf: catch_workers_output +
;                                            php_admin_value[error_log])
;
; All three streams are captured by vigild via forward-logs: enabled and
; visible in "podman logs".

[global]
; Send FPM master-process messages (startup, worker crashes, config errors)
; to stderr.  vigild captures the php-fpm process's stderr and re-emits it
; prefixed with "[php-fpm]" when forward-logs: enabled.
error_log = /dev/stderr

; Keep the master in the foreground so vigild can supervise it.
; (-F on the command line does the same thing; this makes it explicit.)
daemonize = no

; Write the PID file so pgrep and the vigil exec check can find the master.
pid = /run/php-fpm/php-fpm83.pid

include=/etc/php83/php-fpm.d/*.conf
