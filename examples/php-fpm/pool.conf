; PHP-FPM [www] pool configuration for vigil-rs example.
;
; Workers use a Unix socket so the FPM pool is accessible to any web server
; or FastCGI client added later (Caddy, nginx, …) without a port conflict.

[www]
user  = nobody
group = nobody

; Unix socket — no port needed when there is no web server in front.
listen       = /run/php-fpm/php-fpm.sock
listen.owner = nobody
listen.group = nobody
listen.mode  = 0660

; Dynamic process manager — spawn workers on demand, keep a minimum idle.
pm                   = dynamic
pm.max_children      = 5
pm.start_servers     = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 3

; FPM status endpoint — useful for deeper checks if a web server is added.
pm.status_path = /status

; ---------------------------------------------------------------------------
; Logging — route everything to stdout / stderr so "podman logs" captures it
; ---------------------------------------------------------------------------

; One line per request written to stderr (which vigild forwards via its pipe).
; /dev/stdout cannot be used: PHP-FPM replaces its own fd 1 with /dev/null
; during daemon initialisation, so open("/dev/stdout") would get /dev/null.
; fd 2 stays open because error_log = /dev/stderr holds it; opening /dev/stderr
; here gives a second fd on the same vigild pipe, so access entries appear in
; "podman logs" prefixed with "[php-fpm]" just like error messages.
;   <ip> - <user> <timestamp> "<method> <uri>" <status> <duration>ms
access.log = /dev/stderr

; Capture each worker's stdout and stderr and pass them to the FPM master,
; which writes them via the master's own stderr (error_log in php-fpm.conf).
catch_workers_output = yes

; Remove the "NOTICE: [pool www] child N said into stderr: ..." wrapper so
; application log lines appear as-is rather than double-wrapped.
decorate_workers_output = no

; PHP error_log for all workers: write to stderr (captured by the master via
; catch_workers_output above, then forwarded by vigild).
php_flag[display_errors]     = off
php_admin_flag[log_errors]   = on
php_admin_value[error_log]   = /dev/stderr
