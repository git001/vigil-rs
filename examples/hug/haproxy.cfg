global
    log stdout format raw daemon
    maxconn 4096
    # Master-worker mode so SIGUSR1 triggers a graceful reload/drain
    master-worker

defaults
    log     global
    option  dontlognull
    timeout connect 5s
    timeout client  30s
    timeout server  30s

# ---------------------------------------------------------------------------
# Health-check socket — used by vigil exec check
# ---------------------------------------------------------------------------
frontend health_socket
    bind unix@/var/run/haproxy/health.sock
    mode http
    monitor-uri /healthz
    option dontlog-normal

# ---------------------------------------------------------------------------
# Main frontend — HTTP on 8080
# ---------------------------------------------------------------------------
frontend http_in
    bind *:8080
    mode http
    default_backend app_backend

backend app_backend
    mode http
    server local 127.0.0.1:8081 check inter 5s

# ---------------------------------------------------------------------------
# Stats / admin page — port 8404
# ---------------------------------------------------------------------------
frontend stats
    bind *:8404
    mode http
    stats enable
    stats uri /
    stats refresh 5s
    stats show-legends
    option dontlog-normal
