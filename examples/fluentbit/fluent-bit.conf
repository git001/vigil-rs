# Fluent Bit configuration for the vigil-rs push example.
#
# Data flow:
#   TCP 127.0.0.1:5170  (vigild connects here and pushes ndjson)
#     → tcp input        (one JSON object per line)
#     → record_modifier  (add collector=fluent-bit)
#     → stdout           (JSON lines → podman logs)
#
# No curl, no SSE framing — vigild is the client, Fluent Bit is the server.

[SERVICE]
    Flush         1
    Log_Level     warn
    Daemon        off
    # Log_Level warn already filters most diagnostic output.
    # The banner is suppressed via the -q CLI flag (see layers/001-services.yaml)
    # because it is printed before the config file is loaded.

[INPUT]
    Name          tcp
    Listen        127.0.0.1
    Port          5170
    # Format json: each newline-delimited line is parsed as a JSON object.
    # Matches the ndjson format vigild pushes.
    Format        json

[FILTER]
    Name          record_modifier
    Match         *
    Record        collector fluent-bit

[OUTPUT]
    Name          stdout
    Match         *
    Format        json_lines
