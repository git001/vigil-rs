[www]
user = nobody
group = nobody

; Listen on Unix socket — Caddy connects here via FastCGI
listen = /run/php-fpm/php-fpm.sock
listen.mode = 0666

; Process manager
pm = dynamic
pm.max_children = 10
pm.start_servers = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 5

; Built-in FPM ping endpoint.
; Caddy forwards /php-health → FastCGI with SCRIPT_FILENAME=/ping.
; FPM intercepts this internally and responds with ping.response (no PHP script needed).
ping.path = /ping
ping.response = pong

; Log to stderr so vigild captures it via `vigil logs`
php_admin_value[error_log] = /proc/self/fd/2
php_admin_flag[log_errors] = on
access.log = /proc/self/fd/2
access.format = "[%t] %m %{REQUEST_URI}e %s %{milliseconds}Tms"
