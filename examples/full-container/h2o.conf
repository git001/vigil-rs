server-name: "h2o (vigil-managed)"

# Container-friendly logging: write directly to stdout/stderr so the
# container runtime (podman/docker/k8s) can collect the logs normally.
access-log: /dev/stdout
error-log:  /dev/stderr

# No pid-file — vigild tracks the process via its own child handle.

# No user-switching: the process runs as whatever user the container uses.

listen:
  port: 8080

hosts:
  default:
    paths:

      # Static document root
      /:
        file.dir: /var/www/html

      # Liveness probe — used by the vigil health check and load balancers.
      # Returns 200 OK immediately via mruby (no disk I/O).
      /healthz:
        mruby.handler: |
          Proc.new do |env|
            [200, {"content-type" => "text/plain"}, ["OK\n"]]
          end

      # h2o internal status page (requests, connections, uptime, …)
      /status:
        status: ON
