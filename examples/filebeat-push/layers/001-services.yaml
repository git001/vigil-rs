summary: Filebeat push-mode log collection example

services:

  dummy-logger:
    summary: Generates simulated application log output (stdout + stderr)
    command: >-
      sh -c 'i=0; while true; do
      echo "INFO  req=$i GET /api/users status=200 duration_ms=$((i % 47 + 3))";
      echo "DEBUG req=$i cache_key=user_$((i % 5)) hit=$((i % 3 == 0))";
      if [ $((i % 7)) -eq 0 ]; then echo "ERROR req=$i downstream=payments timeout=30s" >&2; fi;
      i=$((i+1)); sleep 1; done'
    startup: enabled
    on-failure: restart
    # vigild pushes ndjson directly to Filebeat's Unix socket.
    # No curl wrapper, no SSE framing — vigild is the client.
    logs-forward: disabled
    logs-push-socket: /run/collector/input.sock

  filebeat:
    summary: Filebeat — listens on Unix socket; vigild pushes ndjson directly
    command: sh -c 'filebeat run --strict.perms=false -c /usr/share/filebeat/vigil-filebeat.yml 2>/dev/null'
    startup: enabled
    on-failure: restart
    backoff-delay: 2s
    backoff-factor: 2.0
    backoff-limit: 30s
    # Filebeat writes collected logs directly to container stdout.
    logs-forward: passthrough
