# Bind to all interfaces so the port is reachable inside the container
quarkus.http.host=0.0.0.0
quarkus.http.port=8080

# Disable the Quarkus startup banner (vigild captures stdout — keep it clean)
quarkus.banner.enabled=false

# Log to stdout/stderr — vigild forwards it via forward-logs: enabled
quarkus.log.console.enable=true
quarkus.log.console.format=%d{HH:mm:ss} %-5p [%c{2.}] %s%e%n
quarkus.log.level=INFO
